name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pytest -q
      - run: python scripts/generate_skills.py --check
      - run: python scripts/validate_skills.py
      - run: git diff --exit-code

  node:
    name: Node offline verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm
          cache-dependency-path: |
            package-lock.json
            nango-integrations/package-lock.json
            mail-bridge/package-lock.json
      - run: npm ci
      - run: npm test --workspace openclaw-plugin
      - run: npm run typecheck --workspace openclaw-plugin
      - run: npm run build --workspace openclaw-plugin
      - run: npm ci
        working-directory: nango-integrations
      - run: npm test
        working-directory: nango-integrations
      - run: npm run typecheck
        working-directory: nango-integrations
      - run: npm run build
        working-directory: nango-integrations
      - run: npm ci
        working-directory: mail-bridge
      - run: npm test
        working-directory: mail-bridge
      - run: npm run typecheck
        working-directory: mail-bridge
      - run: npm run build
        working-directory: mail-bridge
      - run: docker build --tag openclaw-yandex-mail-bridge:ci .
        working-directory: mail-bridge
      - run: git diff --exit-code
